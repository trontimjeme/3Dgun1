<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Block Tactical 5v5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- MAIN MENU -->
  <div id="main-menu" class="screen active">
    <div class="menu-bg"></div>
    <div class="menu-panel">
      <p class="brand">BLOCK TACTICAL</p>
      <h1 class="game-title">5v5</h1>
      <p class="subtitle">Nhặt hộp súng · 5 phút · CT vs Terrorist</p>
      <div class="name-row">
        <input type="text" id="player-name" placeholder="Tên của bạn" maxlength="16" autocomplete="off">
      </div>
      <div class="menu-buttons">
        <button id="btn-create-room" class="btn primary">Tạo Phòng Online</button>
        <button id="btn-join-room" class="btn">Vào Phòng</button>
        <button id="btn-bot-game" class="btn accent">Chơi với Bot 5v5</button>
      </div>
      <p id="conn-status" class="conn-status"></p>
    </div>
  </div>

  <!-- JOIN -->
  <div id="join-screen" class="screen">
    <div class="menu-panel">
      <h2>Vào Phòng</h2>
      <input type="text" id="room-code-input" placeholder="Mã phòng (6 ký tự)" maxlength="6" autocomplete="off">
      <button id="btn-confirm-join" class="btn primary">Tham Gia</button>
      <button id="btn-back-join" class="btn ghost">Quay Lại</button>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-layout">
      <div class="menu-panel wide lobby-main">
        <h2>Phòng: <span id="lobby-code">------</span>
          <button id="btn-copy-code" class="btn-mini" title="Copy">Copy</button>
        </h2>
        <p id="lobby-mode">Chế độ: 5v5 · CT bảo vệ · T tấn công · 5:00</p>
        <div class="teams">
          <div class="team-col ct">
            <h3>Counter-Terrorist</h3>
            <div id="ct-list" class="player-list"></div>
            <button id="btn-join-ct" class="btn team-btn">Vào CT</button>
          </div>
          <div class="team-col t">
            <h3>Terrorist</h3>
            <div id="t-list" class="player-list"></div>
            <button id="btn-join-t" class="btn team-btn">Vào T</button>
          </div>
        </div>
        <div class="lobby-actions">
          <button id="btn-ready" class="btn primary">Sẵn Sàng</button>
          <button id="btn-fill-bots" class="btn accent">Điền Bot</button>
          <button id="btn-start-game" class="btn accent hidden">Bắt Đầu</button>
          <button id="btn-leave-lobby" class="btn ghost">Rời Phòng</button>
        </div>
      </div>
      <div class="chat-panel">
        <h3>Chat</h3>
        <div id="chat-messages"></div>
        <form id="chat-form">
          <input type="text" id="chat-input" placeholder="Nhắn tin..." maxlength="120" autocomplete="off">
          <button type="submit" class="btn-mini">Gửi</button>
        </form>
      </div>
    </div>
  </div>

  <!-- GAME HUD -->
  <div id="game-hud" class="hidden">
    <div id="hud-top">
      <div id="team-badge">CT</div>
      <div id="scoreboard">
        <span id="score-ct">0</span>
        <span class="score-sep">:</span>
        <span id="score-t">0</span>
      </div>
      <div id="timer-display">5:00</div>
      <div id="alive-count">5 vs 5</div>
    </div>

    <div id="countdown-overlay" class="hidden"><span id="countdown-num">3</span></div>
    <div id="drone-banner" class="hidden">CAMERA TOÀN CẢNH — Nhấn để vào trận</div>
    <div id="crosshair"><span></span></div>

    <div id="hud-weapon">
      <div id="weapon-name">—</div>
      <div id="ammo-display"><span id="ammo-clip">0</span> / <span id="ammo-reserve">0</span></div>
      <div id="hp-bar"><div id="hp-fill"></div><span id="hp-text">100</span></div>
    </div>

    <div id="kill-feed"></div>
    <div id="game-messages"></div>

    <!-- Mobile / touch controls -->
    <div id="touch-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="action-buttons">
        <button class="act-btn" id="btn-jump" data-act="jump">Nhảy</button>
        <button class="act-btn" id="btn-prone" data-act="prone">Nằm</button>
        <button class="act-btn" id="btn-ads" data-act="ads">Ngắm</button>
        <button class="act-btn" id="btn-reload" data-act="reload">Nạp</button>
        <button class="act-btn" id="btn-pickup" data-act="pickup">Nhặt</button>
        <button class="act-btn fire" id="btn-fire" data-act="fire">Bắn</button>
      </div>
      <button id="btn-drone-cam" class="drone-btn" title="Camera toàn cảnh">Drone</button>
      <div id="look-zone"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-overlay" class="hidden">
    <div class="result-panel">
      <h2 id="result-title"></h2>
      <p id="result-detail"></p>
      <button id="btn-result-menu" class="btn primary">Về Menu</button>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <script src="server-config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
